<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to ProjectCrew — your collaborative project platform.">
    <title>Sign In | ProjectCrew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0F4FF 0%, #EEF2FF 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(74,144,226,0.18) 0%, transparent 70%);
            top: -150px; left: -100px;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(108,92,231,0.15) 0%, transparent 70%);
            bottom: -100px; right: -80px;
        }

        /* Login card */
        .login-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226,232,240,0.8);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(74,144,226,0.12), 0 8px 24px rgba(0,0,0,0.06);
            animation: scaleIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
            text-decoration: none;
        }
        .login-logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #4A90E2, #6C5CE7);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(74,144,226,0.4);
        }
        .login-logo-icon svg { color: white; width: 22px; height: 22px; }
        .login-logo-text { font-size: 20px; font-weight: 700; color: #1A1D2E; }

        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: #1A1D2E;
            text-align: center;
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #6B7280;
            text-align: center;
            margin-bottom: 28px;
        }

        /* Input styling */
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            width: 17px; height: 17px;
            color: #9CA3AF;
            pointer-events: none;
        }
        .input-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9CA3AF;
            background: none; border: none; padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .input-toggle:hover { color: #4A90E2; background: rgba(74,144,226,0.08); }
        .input-toggle svg { width: 17px; height: 17px; }

        .field-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1.5px solid #E2E8F0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: #1A1D2E;
            background: #FAFBFF;
            outline: none;
            transition: all 0.2s;
        }
        .field-input:focus {
            border-color: #4A90E2;
            background: white;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.12);
        }
        .field-input.error-input { border-color: #EF4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.10); }
        .field-input-right { padding-right: 44px; }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 7px;
        }

        .field-error {
            font-size: 12px;
            color: #EF4444;
            margin-top: 5px;
            display: none;
        }

        /* Alert banner */
        .alert-banner {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            animation: fadeInUp 0.3s ease;
        }
        .alert-banner.error {
            display: flex;
            background: #FEE2E2;
            color: #DC2626;
            border: 1px solid #FECACA;
        }
        .alert-banner.success {
            display: flex;
            background: #E0FBF5;
            color: #059669;
            border: 1px solid #A7F3D0;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: linear-gradient(135deg, #4A90E2 0%, #6C5CE7 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(74,144,226,0.4);
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74,144,226,0.45);
        }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .btn-spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }
        .btn-text-inner { transition: opacity 0.2s; }
        .loading .btn-spinner { display: block; }
        .loading .btn-text-inner { opacity: 0; }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 20px 0;
        }
        .divider-line { flex: 1; height: 1px; background: #E2E8F0; }
        .divider-text { font-size: 12px; color: #9CA3AF; white-space: nowrap; }

        /* Social buttons */
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .social-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 10px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            color: #6B7280;
            text-decoration: none;
        }
        .social-btn:hover {
            border-color: #4A90E2;
            background: #EBF3FF;
            color: #4A90E2;
        }
        .social-btn svg { width: 20px; height: 20px; }

        /* Checkbox */
        .checkbox-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #6B7280; cursor: pointer;
        }
        .checkbox-label input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: #4A90E2;
            cursor: pointer;
        }

        /* Links */
        .text-link { color: #4A90E2; font-weight: 600; text-decoration: none; }
        .text-link:hover { text-decoration: underline; }

        /* Bottom text */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6B7280;
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>

    <script src="assets/js/global.js"></script>
    <script>
    // ── Password visibility toggle (NO feather.replace re-render) ──
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password');
    const eyeShow = document.getElementById('eye-show');
    const eyeHide = document.getElementById('eye-hide');

    toggleBtn.addEventListener('click', () => {
        const isText = passwordInput.type === 'text';
        passwordInput.type = isText ? 'password' : 'text';
        eyeShow.style.display = isText ? 'block' : 'none';
        eyeHide.style.display = isText ? 'none' : 'block';
    });

    // ── Form validation & loading state ──
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const alertBanner = document.getElementById('alert-banner');
    const alertText = document.getElementById('alert-text');

    function showAlert(msg, type = 'error') {
        alertBanner.className = `alert-banner ${type}`;
        alertText.textContent = msg;
        alertBanner.style.display = 'flex';
        alertBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function hideAlert() { alertBanner.style.display = 'none'; }

    function setLoading(loading) {
        if (loading) {
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            document.getElementById('btn-text').textContent = 'Signing in…';
        } else {
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            document.getElementById('btn-text').textContent = 'Sign In';
        }
    }

    form.addEventListener('submit', (e) => {
        hideAlert();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        let hasError = false;

        // Email validation
        const emailError = document.getElementById('email-error');
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('email').classList.add('error-input');
            emailError.style.display = 'block';
            hasError = true;
        } else {
            document.getElementById('email').classList.remove('error-input');
            emailError.style.display = 'none';
        }

        // Password validation
        const passError = document.getElementById('password-error');
        if (!password) {
            document.getElementById('password').classList.add('error-input');
            passError.style.display = 'block';
            hasError = true;
        } else {
            document.getElementById('password').classList.remove('error-input');
            passError.style.display = 'none';
        }

        if (hasError) {
            e.preventDefault();
            showAlert('Please fix the errors below before signing in.');
            return;
        }

        // Show loading
        setLoading(true);
        // Form submits normally — if server returns error, it should redirect back
        // with a query param. Handle that on page load.
    });

    // Check for server-side error in URL params
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === '1') {
        showAlert('Invalid email or password. Please try again.');
    } else if (urlParams.get('error') === 'session') {
        showAlert('Your session has expired. Please sign in again.', 'error');
    }

    // Clear error on input
    document.getElementById('email').addEventListener('input', () => {
        document.getElementById('email').classList.remove('error-input');
        document.getElementById('email-error').style.display = 'none';
    });
    document.getElementById('password').addEventListener('input', () => {
        document.getElementById('password').classList.remove('error-input');
        document.getElementById('password-error').style.display = 'none';
    });
    </script>
